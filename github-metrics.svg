<svg xmlns="http://www.w3.org/2000/svg" width="760" height="250" viewBox="0 0 760 250" role="img" aria-labelledby="title desc">
  <title id="title">NextWeb4 profile metrics</title>
  <desc id="desc">Transparent compact profile metrics for HaoXiang Huang and NextWeb4.</desc>
  <style>
    .title{fill:#58a6ff;font:700 28px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .name{fill:#c9d1d9;font:600 17px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .muted{fill:#8b949e;font:14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .small{fill:#8b949e;font:12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .link{fill:#79c0ff;font:14px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .label{fill:#f0f6fc;font:600 13px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
    .chipText{fill:#c9d1d9;font:12px -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif}
  </style>
  <g transform="translate(28 30)">
    <text class="title" x="0" y="0">NextWeb4</text>
    <text class="name" x="0" y="32">HaoXiang Huang</text>
    <text class="muted" x="0" y="58">Desktop tools / web publishing / learning archives / automation</text>
    <text class="link" x="0" y="84">https://nextweb4.github.io/</text>
    <line x1="0" y1="116" x2="704" y2="116" stroke="#30363d" stroke-width="1"/>
    <text class="label" x="0" y="148">Focus</text>
    <text class="chipText" x="58" y="148">local-first apps</text>
    <text class="chipText" x="176" y="148">bilingual docs</text>
    <text class="chipText" x="294" y="148">GitHub Pages</text>
    <text class="chipText" x="416" y="148">proxy config</text>
    <text class="small" x="0" y="182">TypeScript / Python / Tauri / React / .NET</text>
    <text class="small" x="610" y="182">16 repos</text>
  </g>
</svg>